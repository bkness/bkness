<svg width="90" height="20" viewBox="0 0 90 20" xmlns="http://www.w3.org/2000/svg">
  <circle cx="10" cy="10" r="3" fill="#00ff00"/>
  <circle cx="10" cy="10" r="3" fill="none" stroke="#00ff00" stroke-width="1">
    <animate attributeName="r" from="3" to="10" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.8" to="0" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" from="1.5" to="0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="22" y="14" font-family="monospace,Courier New,Courier" font-size="11" fill="#00ff00" letter-spacing="1">online</text>
</svg>
